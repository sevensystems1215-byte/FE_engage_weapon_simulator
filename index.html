<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FEエンゲージ 武器シミュレーター</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f1117;--surface:#181b24;--card:#1e2130;--border:#2a2f42;
  --border-bright:#3d4560;--text:#e8eaf2;--muted:#7a80a0;--faint:#3a4060;
  --accent:#5b8dee;--accent2:#e8a44b;--red:#e05c6a;--green:#4ec98a;--gold:#f0c040;--r:8px;
  --wc-bg:#2c2f3a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);font-size:12px;line-height:1.5;min-height:100vh;
  background-image:radial-gradient(ellipse at 20% 0%,rgba(91,141,238,.07) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(232,164,75,.05) 0%,transparent 60%);}
.header{padding:14px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;
  background:rgba(24,27,36,.95);position:sticky;top:0;z-index:100;backdrop-filter:blur(8px);}
.header-title{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;letter-spacing:.04em;}
.header-title span{color:var(--accent);}
.header-sub{font-size:10px;color:var(--muted);margin-top:1px;}
.summary-bar{margin:10px 16px 8px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:8px 14px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;min-height:38px;}
.summary-label{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-right:4px;}
.summary-chip{display:inline-flex;align-items:center;gap:3px;background:var(--surface);border:1px solid var(--border);
  border-radius:4px;padding:2px 7px;font-size:10px;}
.summary-chip .wt{font-weight:700;color:var(--accent2);}
#roster-area{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:10px;padding:0 16px 24px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;transition:border-color .2s;}
.card:hover{border-color:var(--border-bright);}
.card-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.unit-num{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.12em;min-width:52px;}
select{font-family:'Noto Sans JP',sans-serif;font-size:11px;background:var(--surface);color:var(--text);
  border:1px solid var(--border);border-radius:4px;padding:3px 5px;outline:none;cursor:pointer;transition:border-color .15s;}
select:focus{border-color:var(--accent);}
.row{display:flex;align-items:center;gap:5px;margin-bottom:5px;flex-wrap:wrap;}
.lbl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;min-width:28px;flex-shrink:0;}
.slots-title{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin:8px 0 5px;}
.slot-row{display:flex;align-items:center;gap:4px;margin-bottom:4px;}
.slot-idx{font-family:'Rajdhani',sans-serif;font-size:9px;color:var(--faint);min-width:14px;text-align:center;}
.slot-wtype{width:60px;flex-shrink:0;font-size:10px;}
.slot-weapon{flex:1;min-width:0;font-size:10px;}
.slot-refine{width:76px;flex-shrink:0;font-size:10px;}
/* Weapon detail card — compact */
.wcard{margin:0 0 4px 18px;background:var(--wc-bg);border:1px solid var(--border);border-radius:5px;
  padding:4px 8px;display:none;}
.wcard.vis{display:block;}
.wc-top{display:flex;align-items:baseline;gap:6px;margin-bottom:2px;flex-wrap:wrap;}
.wc-name{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;color:var(--accent2);}
.wc-name.sealed{color:var(--red);}
.wc-name.temp-sealed{color:var(--accent);}
.wc-refine{font-size:11px;color:var(--green);font-weight:700;}
.wc-mat{color:var(--gold);font-size:9px;}
.wc-cost{color:var(--gold);font-size:9px;}
.wc-bottom{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;}
.wc-stat{display:inline-flex;align-items:center;gap:2px;font-size:10px;}
.wc-stat-l{color:var(--muted);font-size:9px;}
.wc-stat-v{font-weight:700;}
.wc-stat-v.up{color:var(--green);}
.wc-stat-v.dn{color:var(--red);}
.wc-desc-inline{font-size:9px;color:var(--muted);margin-left:2px;}
.wc-lv{background:var(--faint);color:var(--text);border-radius:3px;padding:1px 5px;
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:9px;}
.slot-seal{width:80px;flex-shrink:0;font-size:10px;}
.slot-seal.dup{border-color:var(--red)!important;color:var(--red)!important;background:rgba(224,92,106,.12)!important;}
.slot-seal.temp{border-color:var(--accent)!important;color:var(--accent)!important;background:rgba(91,141,238,.12)!important;}
.wc-seal{display:inline-flex;align-items:center;gap:3px;font-size:9px;background:rgba(224,92,106,.15);
  border:1px solid rgba(224,92,106,.5);border-radius:3px;padding:1px 5px;color:var(--red);margin-left:4px;}
.wc-seal.temp{background:rgba(91,141,238,.15);border-color:var(--accent);color:var(--accent);}

.wlv-badge{display:inline-flex;align-items:center;gap:2px;font-size:9px;padding:1px 5px;border-radius:3px;
  background:var(--surface);border:1px solid var(--border);margin-right:3px;margin-bottom:2px;}
.wlv-badge.up{border-color:var(--green);color:var(--green);}
.cost-total{font-size:10px;color:var(--gold);text-align:right;margin-top:4px;font-weight:600;}
.btn-done{border:none;padding:2px 8px;font-size:9px;font-weight:700;border-radius:4px;cursor:pointer;font-family:inherit;
  background:rgba(232,164,75,.1);color:var(--accent2);border:1px solid rgba(232,164,75,.4);transition:all .15s;white-space:nowrap;}
.btn-done:hover{background:rgba(232,164,75,.2);border-color:var(--accent2);}
.btn-done.done{background:rgba(232,164,75,.25);color:var(--accent2);border-color:var(--accent2);opacity:.5;}
@media(max-width:860px){#roster-area{grid-template-columns:1fr;}}
.save-area{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.btn-act{border:none;padding:5px 12px;font-size:11px;font-weight:600;border-radius:5px;cursor:pointer;font-family:inherit;transition:all .15s;}
.btn-save{background:var(--text);color:var(--bg);}
.btn-load{background:var(--border);color:var(--text);}
.btn-overwrite{background:#2a1f4a;color:#a78bfa;border:1px solid #4c3a8a;}
.btn-del{background:#2a1010;color:var(--red);border:1px solid #5a2020;}
#save-select{font-family:inherit;font-size:11px;padding:5px 7px;min-width:160px;border:1px solid var(--border);border-radius:5px;background:var(--surface);color:var(--text);}
</style>
</head>
<body>
<div class="header">
  <div style="flex:1;">
    <div class="header-title"><span>FE</span> Engage — 武器シミュレーター</div>
    <div class="header-sub">14人編成 × 5装備枠 ｜ 武器詳細・錬成コスト確認</div>
  </div>
  <div class="save-area">
    <select id="save-select"><option value="" disabled selected>— セーブデータ —</option></select>
    <button class="btn-act btn-load" onclick="localLoad()">読込</button>
    <button class="btn-act btn-save" onclick="localSave()">新規保存</button>
    <button class="btn-act btn-overwrite" onclick="localOverwrite()">上書き</button>
    <button class="btn-act btn-del" onclick="localDelete()">削除</button>
    <span style="color:var(--border);margin:0 2px;">│</span>
    <button class="btn-act" onclick="generateShareLink()" style="background:#0f2a1a;color:#4ec98a;border:1px solid #1a5c30;">共有リンク</button>
  </div>
</div>

<div id="seal-bar" style="background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:8px 14px;margin:10px 16px 8px;font-size:11px;display:flex;flex-direction:column;gap:6px;">
  <div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px;min-height:24px;">
    <span style="font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-right:4px;white-space:nowrap;">未使用刻印</span>
    <span id="seal-bar-body" style="display:flex;flex-wrap:wrap;gap:4px;"></span>
  </div>
  <div id="seal-mat-display" style="display:flex;align-items:center;flex-wrap:wrap;gap:4px;padding-top:5px;border-top:1px solid var(--border);min-height:22px;">
    <span style="color:var(--muted);font-size:10px;">錬成なし</span>
  </div>
</div>

<div id="roster-area"></div>

function getAvailableWeaponTypes(cls){
  let wm=classWeaponBase[cls]; if(!wm) return [];
  let r=[];
  for(let k of Object.keys(wm)){let wt=classKeyToWtype[k]; if(wt&&weaponBase[wt]) r.push(wt);}
  return [...new Set(r)];
}
function getWeaponsForClass(cls,wtype,cn){
  let wm=classWeaponBase[cls]; if(!wm) return [];
  let ck=Object.keys(classKeyToWtype).find(k=>classKeyToWtype[k]===wtype);
  if(!ck||!wm[ck]) return [];
  let lv=wm[ck], rank=lvRank[lv]??-1;
  let apt=aptitudeDB[cn]||{};
  let boosted=apt[ck]==='☆'&&lv.includes('+');
  let effRank=boosted?Math.min(rank+1,3):rank;
  return (weaponBase[wtype]||[]).filter(w=>(lvRank[w.lv]??-1)<=effRank);
}

function filterCls(ci){
  let cat=document.getElementById(`cc-${ci}`).value;
  let sel=document.getElementById(`cl-${ci}`);
  let old=sel.value;
  sel.innerHTML='<option value="">兵種</option>';
  if(!cat){
    for(let[g,cs]of Object.entries(classGroups)){
      let og=document.createElement('optgroup');og.label=g;
      cs.forEach(c=>{let o=document.createElement('option');o.value=c;o.textContent=c;og.appendChild(o);});
      sel.appendChild(og);
    }
  } else {
    (classGroups[cat]||[]).forEach(c=>{let o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);});
  }
  // Restore value — if old exists in new list keep it; if not, add it as hidden option
  if(old){
    if(![...sel.options].some(o=>o.value===old)){
      let o=document.createElement('option');o.value=old;o.textContent=old;sel.appendChild(o);
    }
    sel.value=old;
  }
  onClsSelect(ci);
}

function onCnSelect(ci){
  let cn=document.getElementById(`cn-${ci}`).value;
  if(cn&&charDB[cn]){
    let ic=charDB[cn].ic;
    let cat=Object.entries(classGroups).find(([,cs])=>cs.includes(ic));
    if(cat){document.getElementById(`cc-${ci}`).value=cat[0]; filterCls(ci);}
    document.getElementById(`cl-${ci}`).value=ic;
  }
  onClsSelect(ci);
}

function onClsSelect(ci){
  let cn=document.getElementById(`cn-${ci}`).value;
  let cls=document.getElementById(`cl-${ci}`).value;
  // weapon level badges
  let div=document.getElementById(`wlvd-${ci}`);
  if(cls&&classWeaponBase[cls]){
    let apt=aptitudeDB[cn]||{},wm=classWeaponBase[cls];
    div.innerHTML=Object.entries(wm).map(([k,lv])=>{
      let b=apt[k]==='☆'&&lv.includes('+');
      let d=b?lv.replace('C+','B').replace('B+','A').replace('A+','S'):lv;
      return `<span class="wlv-badge${b?' up':''}">${k}:${d}${b?'↑':''}</span>`;
    }).join('');
  } else div.innerHTML='';
  for(let s=0;s<SLOTS;s++) updateWtOptions(ci,s);
  updateCost(ci); updateSummary();
}

function updateWtOptions(ci,si){
  let cls=document.getElementById(`cl-${ci}`).value;
  let sel=document.getElementById(`wt-${ci}-${si}`);
  let old=sel.value;
  sel.innerHTML='<option value="">武器種</option>';
  if(cls){
    let types=getAvailableWeaponTypes(cls);
    types.forEach(t=>{let o=document.createElement('option');o.value=t;o.textContent=t;sel.appendChild(o);});
    if(old&&types.includes(old)) sel.value=old; else sel.value='';
  }
  onWtChange(ci,si);
}

function onWtChange(ci,si){
  let cls=document.getElementById(`cl-${ci}`).value;
  let cn=document.getElementById(`cn-${ci}`).value;
  let wtype=document.getElementById(`wt-${ci}-${si}`).value;
  let sel=document.getElementById(`wp-${ci}-${si}`);
  let old=sel.value;
  sel.innerHTML='<option value="">武器</option>';
  if(cls&&wtype){
    getWeaponsForClass(cls,wtype,cn).forEach(w=>{
      let o=document.createElement('option');o.value=w.name;
      o.textContent=`${w.name}（威力${w.atk} 命中${w.hit} ${w.lv}級）`;
      sel.appendChild(o);
    });
    // 既存値を維持
    if(old){
      if(![...sel.options].some(o=>o.value===old)){
        let o=document.createElement('option');o.value=old;o.textContent=old;sel.appendChild(o);
      }
      sel.value=old;
    }
  }
  onWpChange(ci,si);
}

function onWpChange(ci,si){
  let wname=document.getElementById(`wp-${ci}-${si}`).value;
  let rsel=document.getElementById(`rf-${ci}-${si}`);
  let old=rsel.value;
  rsel.innerHTML='<option value="">未強化</option>';
  if(wname&&refineData[wname]){
    refineData[wname].forEach(r=>{
      let o=document.createElement('option');o.value=r.level;
      // 銀換算スコア表示（小数は切り上げ表示にする）
      let sc=r.silverScore;
      let scStr=sc>0?(sc<0.1?'<0.1':'銀'+sc.toFixed(2)):'';
      o.textContent=`${r.level}  威力${r.atk}  ${scStr}  ${r.cost}G`;
      rsel.appendChild(o);
    });
    if(old&&[...rsel.options].some(o=>o.value===old)) rsel.value=old;
    else rsel.value='';
  }
  updateCard(ci,si);
}

function onSealChange(ci,si){
  let sel=document.getElementById(`sl-${ci}-${si}`);
  let stEl=document.getElementById(`st-${ci}-${si}`);
  let isTemp=stEl?stEl.checked:false;
  if(isTemp){ sel.classList.add('temp'); sel.classList.remove('dup'); }
  else { sel.classList.remove('temp'); }
  checkSealDups();
  updateCard(ci,si);
}

// 全ユニット×スロットの刻印重複チェック → 2箇所以上同じ紋章士が選ばれたら赤く警告
function checkSealDups(){
  // 集計（暫定チェック済みスロットは除外）
  let counts={};
  for(let i=0;i<MAX_CHARS;i++) for(let s=0;s<SLOTS;s++){
    let stEl=document.getElementById(`st-${i}-${s}`);
    let isTemp=stEl?stEl.checked:false;
    let slEl=document.getElementById(`sl-${i}-${s}`);
    let v=slEl?slEl.value:'';
    if(v&&!isTemp) counts[v]=(counts[v]||0)+1;
  }
  // セレクトに色付け（tempは青を維持、非tempのみdup判定）
  for(let i=0;i<MAX_CHARS;i++) for(let s=0;s<SLOTS;s++){
    let sel=document.getElementById(`sl-${i}-${s}`);
    if(!sel) continue;
    let stEl=document.getElementById(`st-${i}-${s}`);
    let isTemp=stEl?stEl.checked:false;
    if(isTemp){ sel.classList.add('temp'); sel.classList.remove('dup'); continue; }
    let v=sel.value;
    if(v&&counts[v]>1) sel.classList.add('dup');
    else sel.classList.remove('dup');
  }
  // 未使用刻印バー更新
  let body=document.getElementById('seal-bar-body');
  let usedSet=new Set(Object.keys(counts));
  let unused=sealDB.filter(s=>!usedSet.has(s.short));
  if(unused.length===0){
    body.innerHTML='<span style="color:#a1a1aa;font-size:10px;">すべて使用中</span>';
  } else {
    body.innerHTML=unused.map(s=>{
      let sign=v=>v>0?`+${v}`:v<0?`${v}`:'';
      let parts=[];
      if(s.atk)  parts.push(`威力${sign(s.atk)}`);
      if(s.hit)  parts.push(`命中${sign(s.hit)}`);
      if(s.crit) parts.push(`必殺${sign(s.crit)}`);
      if(s.wt)   parts.push(`重さ${sign(s.wt)}`);
      if(s.avo)  parts.push(`回避${sign(s.avo)}`);
      if(s.cavo) parts.push(`必避${sign(s.cavo)}`);
      let tip=parts.join(' ');
      return `<span title="${s.name}&#10;${tip}" style="display:inline-flex;align-items:center;gap:3px;background:#f4f4f5;border:1px solid #e4e4e7;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:600;color:#3f3f46;cursor:default;white-space:nowrap;">${s.short}</span>`;
    }).join('');
  }
}

function updateCard(ci,si){
  let wtype=document.getElementById(`wt-${ci}-${si}`).value;
  let wname=document.getElementById(`wp-${ci}-${si}`).value;
  let rlv=document.getElementById(`rf-${ci}-${si}`).value;
  let card=document.getElementById(`wc-${ci}-${si}`);
  if(!wname){card.classList.remove('vis');card.innerHTML='';updateCost(ci);updateSummary();return;}

  let base=(weaponBase[wtype]||[]).find(w=>w.name===wname);
  if(!base){card.classList.remove('vis');return;}

  // Accumulate stats up to chosen refine level
  let st={atk:base.atk,hit:base.hit,crit:base.crit,wt:base.wt,avo:base.avo,cavo:base.cavo};
  let refineCost=0;
  let matIron=0,matSteel=0,matSilver=0,matScore=0;
  const allLvls=['+1','+2','+3','+4','+5'];
  if(rlv&&refineData[wname]){
    let ti=allLvls.indexOf(rlv);
    for(let ri=0;ri<=ti;ri++){
      let r=refineData[wname].find(x=>x.level===allLvls[ri]);
      if(!r) continue;
      if(r.atk!==null) st.atk=r.atk;
      if(r.hit!==null) st.hit=r.hit;
      if(r.crit!==null) st.crit=r.crit;
      if(r.wt!==null) st.wt=r.wt;
      if(r.avo!==null) st.avo=r.avo;
      if(r.cavo!==null) st.cavo=r.cavo;
      refineCost+=r.cost||0;
      matIron+=(r.iron||0); matSteel+=(r.steel||0); matSilver+=(r.silver||0);
      matScore+=(r.silverScore||0);
    }
  }

  // 刻印補正を適用
  let sealShort=document.getElementById(`sl-${ci}-${si}`).value;
  let sealData=sealDB.find(s=>s.short===sealShort)||null;
  let stWithSeal={...st};
  if(sealData){
    stWithSeal.atk=+st.atk+(sealData.atk||0);
    stWithSeal.hit=+st.hit+(sealData.hit||0);
    stWithSeal.crit=+st.crit+(sealData.crit||0);
    stWithSeal.wt=+st.wt+(sealData.wt||0);
    stWithSeal.avo=+st.avo+(sealData.avo||0);
    stWithSeal.cavo=+st.cavo+(sealData.cavo||0);
  }
  let isDupSeal=sealShort&&document.getElementById(`sl-${ci}-${si}`).classList.contains('dup');

  const fv=v=>(v!=null&&v!=='')?(+v||0):0;
  // diff vs base+refine (without seal) → shows seal contribution in green/red
  const df=(a,b)=>{let d=fv(a)-fv(b);return d===0?'':d>0?`<span style="font-size:8px;color:var(--green);">+${d}</span>`:`<span style="font-size:8px;color:var(--red);">${d}</span>`;};
  const sv=(v,bv)=>{
    let d=fv(v)-fv(bv);
    let cls=d>0?'up':d<0?'dn':'';
    return `<span class="wc-stat-v${cls?' '+cls:''}">${v??0}${df(v,bv)}</span>`;
  };

  let statsHtml=`
    <div class="wc-stat"><span class="wc-stat-l">威力</span>${sv(stWithSeal.atk,base.atk)}</div>
    <div class="wc-stat"><span class="wc-stat-l">命中</span>${sv(stWithSeal.hit,base.hit)}</div>
    <div class="wc-stat"><span class="wc-stat-l">必殺</span>${sv(stWithSeal.crit,base.crit)}</div>
    <div class="wc-stat"><span class="wc-stat-l">重さ</span>${sv(stWithSeal.wt,base.wt)}</div>
    <div class="wc-stat"><span class="wc-stat-l">回避</span>${sv(stWithSeal.avo,base.avo)}</div>
    <div class="wc-stat"><span class="wc-stat-l">必避</span>${sv(stWithSeal.cavo,base.cavo)}</div>
    <div class="wc-stat"><span class="wc-stat-l">射程</span><span class="wc-stat-v">${base.range}</span></div>`;

  // 素材表記
  let matStr='';
  if(rlv&&matScore>0){
    let parts=[];
    if(matIron>0) parts.push(`てつ×${matIron}`);
    if(matSteel>0) parts.push(`はがね×${matSteel}`);
    if(matSilver>0) parts.push(`ぎん×${matSilver}`);
    let sc=Math.round(matScore*100)/100;
    matStr=`<span class="wc-mat">${parts.join(' ')}（銀換算${sc}）</span>`;
  }
  let costStr=rlv&&refineCost?`<span class="wc-cost">錬成${refineCost}G</span>`:'';
  let stEl2=document.getElementById(`st-${ci}-${si}`);
  let isTempSeal=sealShort&&(stEl2?stEl2.checked:false);
  let sealClass=isDupSeal?' dup':isTempSeal?' temp':'';
  let sealBadge=sealData?`<span class="wc-seal${sealClass}" title="${sealData.name}">刻印:${sealShort}${isDupSeal?' ⚠重複':isTempSeal?' 暫定':''}</span>`:'';

  card.classList.add('vis');
  card.innerHTML=`
    <div class="wc-top">
      <span class="wc-name${sealData?(isTempSeal?' temp-sealed':' sealed'):''}">${wname}</span>${rlv?`<span class="wc-refine">${rlv}</span>`:''}
      <span class="wc-lv">${base.lv}級</span>
      ${sealBadge}
    </div>
    <div class="wc-bottom">${statsHtml}${base.desc?`<span class="wc-desc-inline">${base.desc}</span>`:''}</div>`;

  updateCost(ci);updateSummary();updateMatBar();
}

// ===== セーブ/ロード =====
// ===== 強化完了トグル =====
function toggleDone(ci,si){
  let btn=document.getElementById(`dn-${ci}-${si}`);
  btn.classList.toggle('done');
  updateMatBar();
}

// ===== 素材集計バー =====
function calcSlotMat(ci,si){
  // 指定スロットの素材(iron,steel,silver,score,cost)を返す
  let wt=document.getElementById(`wt-${ci}-${si}`).value;
  let wp=document.getElementById(`wp-${ci}-${si}`).value;
  let rlv=document.getElementById(`rf-${ci}-${si}`).value;
  if(!wt||!wp||!rlv) return null;
  let wbase=(weaponBase[wt]||[]).find(w=>w.name===wp);
  if(!wbase) return null;
  let iron=0,steel=0,silver=0,score=0,cost=0;
  const allLvls=['+1','+2','+3','+4','+5'];
  let ti=allLvls.indexOf(rlv);
  if(ti<0||!refineData[wp]) return null;
  for(let ri=0;ri<=ti;ri++){
    let r=refineData[wp].find(x=>x.level===allLvls[ri]);
    if(!r) continue;
    iron+=(r.iron||0); steel+=(r.steel||0); silver+=(r.silver||0);
    score+=(r.silverScore||0); cost+=(r.cost||0);
  }
  return {iron,steel,silver,score:Math.round(score*100)/100,cost};
}

function updateMatBar(){
  let totalIron=0,totalSteel=0,totalSilver=0,totalScore=0,totalCost=0;
  let remIron=0,remSteel=0,remSilver=0,remScore=0,remCost=0;
  for(let i=0;i<MAX_CHARS;i++) for(let s=0;s<SLOTS;s++){
    let m=calcSlotMat(i,s);
    if(!m) continue;
    totalIron+=m.iron; totalSteel+=m.steel; totalSilver+=m.silver;
    totalScore+=m.score; totalCost+=m.cost;
    let done=document.getElementById(`dn-${i}-${s}`).classList.contains('done');
    // mat-inline 表示更新
    let mi=document.getElementById(`mi-${i}-${s}`);
    if(mi){
      let parts=[];
      if(m.iron>0) parts.push(`てつ${m.iron}`);
      if(m.steel>0) parts.push(`はがね${m.steel}`);
      if(m.silver>0) parts.push(`ぎん${m.silver}`);
      parts.push(`銀換算${m.score}`);
      if(m.cost>0) parts.push(`${m.cost}G`);
      mi.textContent=parts.join(' ');
      mi.style.textDecoration=done?'line-through':'none';
      mi.style.opacity=done?'0.35':'1';
      mi.style.color=done?'var(--muted)':'var(--accent2)';
    }
    if(!done){
      remIron+=m.iron; remSteel+=m.steel; remSilver+=m.silver;
      remScore+=m.score; remCost+=m.cost;
    }
  }
  totalScore=Math.round(totalScore*100)/100;
  remScore=Math.round(remScore*100)/100;

  // seal-bar の素材表示更新
  let matEl=document.getElementById('seal-mat-display');
  if(!matEl) return;
  if(totalScore===0){
    matEl.innerHTML='<span style="color:var(--muted);font-size:10px;">錬成なし</span>';
    return;
  }
  let allDone=(remScore===0);
  // 残 / 全
  let remParts=[], totParts=[];
  if(remIron>0||totalIron>0) remParts.push(`てつ${remIron}`), totParts.push(`てつ${totalIron}`);
  if(remSteel>0||totalSteel>0) remParts.push(`はがね${remSteel}`), totParts.push(`はがね${totalSteel}`);
  if(remSilver>0||totalSilver>0) remParts.push(`ぎん${remSilver}`), totParts.push(`ぎん${totalSilver}`);
  let remStr=remParts.join(' ')+`　<span style="font-weight:700;color:${allDone?'var(--green)':'var(--accent2)'};">銀換算${remScore}</span>`;
  let totStr=totParts.join(' ')+`　銀換算${totalScore}`;
  matEl.innerHTML=`
    <span style="font-size:9px;font-weight:700;color:var(--muted);margin-right:4px;white-space:nowrap;">必要素材</span>
    <span style="font-size:10px;color:var(--text);">${remStr}</span>
    <span style="color:var(--border);margin:0 5px;">/</span>
    <span style="font-size:10px;color:var(--muted);">${totStr}</span>
    ${remCost?`<span style="font-size:10px;color:var(--gold);margin-left:6px;">残コスト${remCost}G</span>`:''}
    ${allDone?'<span style="color:var(--green);font-size:10px;margin-left:6px;">✓ 全強化完了</span>':''}`;
}

// ===== URL共有 =====
function generateShareLink(){
  try{
    let data=gatherData();
    // 空ユニットを除いてコンパクト化
    let compact=data.map((d,i)=>{
      if(!d.cn) return null;
      let o={i,cn:d.cn};
      if(d.cc) o.cc=d.cc;
      if(d.cl) o.cl=d.cl;
      let slots=d.slots.filter(s=>s.wt||s.wp);
      if(slots.length) o.s=slots.map(s=>{
        let x={};
        if(s.wt) x.wt=s.wt;
        if(s.wp) x.wp=s.wp;
        if(s.rf) x.rf=s.rf;
        if(s.sl) x.sl=s.sl;
        if(s.st) x.st=1;
        if(s.dn) x.dn=1;
        return x;
      });
      return o;
    }).filter(Boolean);
    if(!compact.length){alert('キャラが1体も設定されていません。');return;}
    let json=JSON.stringify(compact);
    let encoded=encodeURIComponent(json);
    let base=location.href.split('#')[0].split('?')[0];
    let url=base+'?d='+encoded;
    showCopyDialog(url);
  }catch(e){alert('エラー: '+e.message);}
}

function showCopyDialog(url){
  let overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;';
  let box=document.createElement('div');
  box.style.cssText='background:#1e2130;border:1px solid #3d4560;border-radius:12px;padding:20px;max-width:520px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.4);';
  box.innerHTML='<div style="font-weight:700;font-size:14px;margin-bottom:6px;color:#e8eaf2;">共有リンク</div>'
    +'<div style="font-size:11px;color:#7a80a0;margin-bottom:12px;">このURLを別のデバイスで開くと同じ編成が復元されます。</div>'
    +'<textarea id="share-url-box" readonly style="width:100%;height:80px;font-size:11px;padding:8px;border:1px solid #3d4560;border-radius:6px;resize:none;font-family:monospace;word-break:break-all;background:#0f1117;color:#e8eaf2;outline:none;"></textarea>'
    +'<div style="display:flex;gap:8px;margin-top:12px;">'
    +'<button id="share-copy-btn" style="flex:1;padding:8px;background:#4ec98a;color:#0f1117;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">コピー</button>'
    +'<button id="share-close-btn" style="flex:1;padding:8px;background:#2a2f42;color:#e8eaf2;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;">閉じる</button>'
    +'</div>';
  overlay.appendChild(box);
  document.body.appendChild(overlay);
  let ta=document.getElementById('share-url-box');
  ta.value=url; ta.select();
  document.getElementById('share-copy-btn').addEventListener('click',function(){
    ta.select(); ta.setSelectionRange(0,99999);
    let ok=false;
    try{ok=document.execCommand('copy');}catch(e){}
    if(!ok&&navigator.clipboard){
      navigator.clipboard.writeText(url).then(()=>{
        this.textContent='✓ コピー完了'; setTimeout(()=>{this.textContent='コピー';},1500);
      }).catch(()=>{alert('手動でコピーしてください。');});
    } else {
      this.textContent='✓ コピー完了'; setTimeout(()=>{this.textContent='コピー';},1500);
    }
  });
  document.getElementById('share-close-btn').addEventListener('click',()=>overlay.remove());
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
}

function loadFromURL(){
  let params=new URLSearchParams(location.search);
  let encoded=params.get('d');
  if(!encoded) return;
  try{
    let compact=JSON.parse(decodeURIComponent(encoded));
    if(!Array.isArray(compact)) return;
    // 空の全体配列を用意してコンパクトデータを展開
    let full=Array.from({length:MAX_CHARS},()=>({cn:'',cc:'',cl:'',slots:Array.from({length:SLOTS},()=>({wt:'',wp:'',rf:'',sl:'',st:false}))}));
    compact.forEach(d=>{
      let i=d.i;
      if(i<0||i>=MAX_CHARS) return;
      full[i].cn=d.cn||'';
      full[i].cc=d.cc||'';
      full[i].cl=d.cl||'';
      (d.s||[]).forEach((x,s)=>{
        if(s>=SLOTS) return;
        full[i].slots[s]={wt:x.wt||'',wp:x.wp||'',rf:x.rf||'',sl:x.sl||'',st:!!x.st,dn:!!x.dn};
      });
    });
    applyData(full);
    history.replaceState(null,'',location.pathname);
  }catch(e){console.error('URL読込エラー:',e);}
}

const LOCAL_INDEX_KEY='FE_Weapon_SaveIndex';
function getSaveIndex(){try{return JSON.parse(localStorage.getItem(LOCAL_INDEX_KEY))||[];}catch{return [];}}
function setSaveIndex(idx){localStorage.setItem(LOCAL_INDEX_KEY,JSON.stringify(idx));}
function nowStr(){let n=new Date();return `${n.getMonth()+1}/${n.getDate()} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;}
function flashBtn(cls,txt){let b=document.querySelector(cls);if(!b)return;let o=b.textContent;b.textContent=txt;setTimeout(()=>b.textContent=o,1500);}

function refreshSaveList(){
  let sel=document.getElementById('save-select');
  let old=sel.value;
  sel.innerHTML='<option value="" disabled>— セーブデータ —</option>';
  getSaveIndex().forEach(s=>{
    let o=document.createElement('option');o.value=s.key;
    o.textContent=`${s.name}  (${s.date})`;sel.appendChild(o);
  });
  if(old&&[...sel.options].some(o=>o.value===old)) sel.value=old;
  else sel.selectedIndex=0;
}

function gatherData(){
  let arr=[];
  for(let i=0;i<MAX_CHARS;i++){
    let d={cn:document.getElementById(`cn-${i}`).value,
           cc:document.getElementById(`cc-${i}`).value,
           cl:document.getElementById(`cl-${i}`).value, slots:[]};
    for(let s=0;s<SLOTS;s++){
      d.slots.push({
        wt:document.getElementById(`wt-${i}-${s}`).value,
        wp:document.getElementById(`wp-${i}-${s}`).value,
        rf:document.getElementById(`rf-${i}-${s}`).value,
        sl:document.getElementById(`sl-${i}-${s}`).value,
            st:document.getElementById(`st-${i}-${s}`).checked,
            dn:document.getElementById(`dn-${i}-${s}`).classList.contains('done'),
      });
    }
    arr.push(d);
  }
  return arr;
}

function applyData(arr){
  for(let i=0;i<MAX_CHARS;i++){
    let d=arr[i]; if(!d) continue;
    document.getElementById(`cn-${i}`).value=d.cn||'';
    document.getElementById(`cc-${i}`).value=d.cc||'';
    filterCls(i);
    document.getElementById(`cl-${i}`).value=d.cl||'';
    onClsSelect(i);
    (d.slots||[]).forEach((sl,s)=>{
      document.getElementById(`wt-${i}-${s}`).value=sl.wt||'';
      onWtChange(i,s);
      document.getElementById(`wp-${i}-${s}`).value=sl.wp||'';
      onWpChange(i,s);
      document.getElementById(`rf-${i}-${s}`).value=sl.rf||'';
      document.getElementById(`sl-${i}-${s}`).value=sl.sl||'';
      document.getElementById(`st-${i}-${s}`).checked=sl.st||false;
      let dnBtn=document.getElementById(`dn-${i}-${s}`);
      if(sl.dn) dnBtn.classList.add('done'); else dnBtn.classList.remove('done');
      updateCard(i,s);
    });
  }
  checkSealDups();
}

function localSave(){
  let name=prompt('セーブデータの名前:','');
  if(!name||!name.trim()) return;
  name=name.trim();
  let key='FE_WS_'+Date.now();
  localStorage.setItem(key,JSON.stringify(gatherData()));
  let saves=getSaveIndex();
  saves.push({key,name,date:nowStr()});
  setSaveIndex(saves);
  refreshSaveList();
  document.getElementById('save-select').value=key;
  flashBtn('.btn-save','✓ 保存完了');
}

function localOverwrite(){
  let sel=document.getElementById('save-select');
  let key=sel.value;
  if(!key){alert('上書きするデータを選択してください。');return;}
  let saves=getSaveIndex();
  let entry=saves.find(s=>s.key===key);
  if(!entry||!confirm(`「${entry.name}」に上書きしますか？`)) return;
  entry.date=nowStr();
  localStorage.setItem(key,JSON.stringify(gatherData()));
  setSaveIndex(saves);
  refreshSaveList();
  sel.value=key;
  flashBtn('.btn-overwrite','✓ 上書き完了');
}

function localLoad(){
  let sel=document.getElementById('save-select');
  let key=sel.value;
  if(!key){alert('読み込むデータを選択してください。');return;}
  let s=localStorage.getItem(key);
  if(!s){alert('データが見つかりません。');return;}
  applyData(JSON.parse(s));
  flashBtn('.btn-load','✓ 読込完了');
}

function localDelete(){
  let sel=document.getElementById('save-select');
  let key=sel.value;
  if(!key){alert('削除するデータを選択してください。');return;}
  let saves=getSaveIndex();
  let entry=saves.find(s=>s.key===key);
  if(!entry||!confirm(`「${entry.name}」を削除しますか？`)) return;
  localStorage.removeItem(key);
  setSaveIndex(saves.filter(s=>s.key!==key));
  refreshSaveList();
}
